<!DOCTYPE html>
<html>
<head>
    <title>WebGL 3D Human Body Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="assets/app_icon.png">
    <script src="threejs/three.min.js"></script>
    <script src="threejs/Detector.js"></script>
    <script src="threejs/OrbitControls.js"></script>
    <script src="threejs/OBJExporter.js"></script>
    <script src="math/numeric-1.2.6.min.js"></script>
    <script src="data/clothf.js"></script>
    <script src="data/clothm.js"></script>
    <script src="data/f.js"></script>
    <script src="data/m.js"></script>
    <script src="yagui/yagui.js"></script>
    <link rel="stylesheet" type="text/css" href="css/yagui.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }

        #viewport {
            width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0;
        }

        /* Esconde toda a interface do yagui */
        .yagui-topbar, .yagui-sidebar, .yagui-sidebar-right,
        .yagui-panel, .yagui-menu, .yagui-menubar,
        [class*="yagui-top"], [class*="yagui-right"], [class*="yagui-sidebar"] {
            display: none !important;
            visibility: hidden !important;
            width: 0 !important; height: 0 !important;
            overflow: hidden !important;
            pointer-events: none !important;
        }

        canvas {
            width: 100vw !important; height: 100vh !important;
            display: block !important;
        }

        /* Container de labels flutuantes */
        #labels-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 100;
        }

        /* Cada label flutuante */
        .body-label {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .body-label-value {
            background: rgba(255, 193, 7, 0.92);
            color: #000;
            font-family: -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 5px;
            white-space: nowrap;
            line-height: 1.3;
            box-shadow: 0 1px 6px rgba(0,0,0,0.5);
        }

        .body-label-name {
            color: rgba(255, 193, 7, 0.75);
            font-family: -apple-system, sans-serif;
            font-size: 9px;
            font-weight: 600;
            margin-top: 2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            letter-spacing: 0.3px;
        }

        /* Linha conectora da label ao corpo */
        .body-label-line {
            width: 1px;
            background: rgba(255, 193, 7, 0.4);
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div id='viewport'></div>
    <!-- Overlay de labels flutuantes -->
    <div id='labels-overlay'></div>

    <script type='text/javascript' src='main.js'></script>

    <script>
    'use strict';

    // ─── Dados recebidos do app ───────────────────────────────────
    var KC_MEASUREMENTS = {
        ombros:   null, peito:  null, cintura: null,
        abdomen:  null, quadril: null,
        bicepsDir: null, bicepsEsq: null,
        coxaDir:  null, coxaEsq: null,
        panturrilhaDir: null, panturrilhaEsq: null,
    };

    // ─── Definição dos pontos de ancoragem no espaço 3D do modelo ─
    // Cada ponto usa coordenadas normalizadas em relação à altura do modelo.
    // x: -0.5 (esquerda) a +0.5 (direita), y: 0 (chão) a 1 (cabeça), z: frontal
    // offsetX: empurra a label para fora do corpo (negativo = esquerda, positivo = direita)
    var LABEL_ANCHORS = [
        { key: 'ombros',      name: 'Ombros',    rx: 0.00,  ry: 0.82, rz: 0.15, offsetX:  0,     lineH: 0  },
        { key: 'peito',       name: 'Peito',     rx: 0.00,  ry: 0.73, rz: 0.18, offsetX:  0,     lineH: 0  },
        { key: 'cintura',     name: 'Cintura',   rx: 0.00,  ry: 0.60, rz: 0.15, offsetX:  0,     lineH: 0  },
        { key: 'abdomen',     name: 'Abdômen',   rx: 0.00,  ry: 0.53, rz: 0.16, offsetX:  0,     lineH: 0  },
        { key: 'quadril',     name: 'Quadril',   rx: 0.00,  ry: 0.46, rz: 0.18, offsetX:  0,     lineH: 0  },
        { key: 'bicepsDir',   name: 'Bíceps D',  rx: -0.19, ry: 0.73, rz: 0.05, offsetX: -28,   lineH: 0  },
        { key: 'bicepsEsq',   name: 'Bíceps E',  rx:  0.19, ry: 0.73, rz: 0.05, offsetX:  28,   lineH: 0  },
        { key: 'coxaDir',     name: 'Coxa D',    rx: -0.13, ry: 0.32, rz: 0.14, offsetX: -28,   lineH: 0  },
        { key: 'coxaEsq',     name: 'Coxa E',    rx:  0.13, ry: 0.32, rz: 0.14, offsetX:  28,   lineH: 0  },
        { key: 'panturrilhaDir', name: 'Pant. D', rx: -0.10, ry: 0.18, rz: 0.12, offsetX: -28,  lineH: 0  },
        { key: 'panturrilhaEsq', name: 'Pant. E', rx:  0.10, ry: 0.18, rz: 0.12, offsetX:  28,  lineH: 0  },
    ];

    // ─── Cria os elementos DOM de cada label ─────────────────────
    var labelEls = {};
    var overlay = document.getElementById('labels-overlay');

    LABEL_ANCHORS.forEach(function(anchor) {
        var wrapper = document.createElement('div');
        wrapper.className = 'body-label';
        wrapper.id = 'label-' + anchor.key;

        if (anchor.lineH > 0) {
            var line = document.createElement('div');
            line.className = 'body-label-line';
            line.style.height = anchor.lineH + 'px';
            wrapper.appendChild(line);
        }

        var valEl = document.createElement('div');
        valEl.className = 'body-label-value';
        valEl.textContent = '--';
        wrapper.appendChild(valEl);

        var nameEl = document.createElement('div');
        nameEl.className = 'body-label-name';
        nameEl.textContent = anchor.name;
        wrapper.appendChild(nameEl);

        overlay.appendChild(wrapper);
        labelEls[anchor.key] = { wrapper: wrapper, valEl: valEl };
    });

    // ─── Atualiza os valores das labels ──────────────────────────
    function updateLabelValues() {
        LABEL_ANCHORS.forEach(function(anchor) {
            var val = KC_MEASUREMENTS[anchor.key];
            var el  = labelEls[anchor.key];
            if (!el) return;
            el.valEl.textContent = (val && val !== '0') ? val + ' cm' : '--';
            el.wrapper.style.opacity = (val && val !== '0') ? '1' : '0.35';
        });
    }

    // ─── Projeta posições 3D → 2D e posiciona as labels ─────────
    // Chamado a cada frame pelo loop de animação do Three.js
    var _origRender = window.render;  // referência ao render original do main.js

    function projectLabels() {
        if (!MESH || !CAMERA || !RENDERER) return;

        // Bounding box do modelo para calcular posições relativas
        var bbox = new THREE.Box3().setFromObject(MESH);
        var modelH = bbox.max.y - bbox.min.y;  // altura real do modelo em metros
        var cx = (bbox.max.x + bbox.min.x) / 2;
        var cz = (bbox.max.z + bbox.min.z) / 2;

        var W = RENDERER.domElement.clientWidth  || window.innerWidth;
        var H = RENDERER.domElement.clientHeight || window.innerHeight;

        LABEL_ANCHORS.forEach(function(anchor) {
            var el = labelEls[anchor.key];
            if (!el) return;

            // Posição 3D do ponto de ancoragem
            var worldPos = new THREE.Vector3(
                cx + anchor.rx * modelH,
                bbox.min.y + anchor.ry * modelH,
                cz + anchor.rz * modelH
            );

            // Projeta para coordenadas de clip (-1 a +1)
            var projected = worldPos.clone().project(CAMERA);

            // Converte para pixels na tela
            var screenX = ( projected.x * 0.5 + 0.5) * W + anchor.offsetX;
            var screenY = (-projected.y * 0.5 + 0.5) * H;

            // Esconde se estiver atrás da câmera
            if (projected.z > 1) {
                el.wrapper.style.display = 'none';
                return;
            }

            el.wrapper.style.display = 'flex';
            el.wrapper.style.left    = screenX + 'px';
            el.wrapper.style.top     = screenY + 'px';
        });
    }

    // ─── Hook no loop de animação ─────────────────────────────────
    // Sobrescreve a função render do main.js para adicionar a projeção
    function hookRenderLoop() {
        if (typeof render === 'function' && typeof RENDERER !== 'undefined') {
            var originalRender = render;
            window.render = function() {
                originalRender();
                projectLabels();
            };
            console.log('KC: render hook aplicado');
        } else {
            setTimeout(hookRenderLoop, 100);
        }
    }

    // ─── Esconde GUI do yagui ─────────────────────────────────────
    function hideGUI() {
        var selectors = [
            '.yagui-topbar', '.yagui-sidebar', '.yagui-panel',
            'nav', '[class*="sidebar"]', '[class*="topbar"]',
            '[class*="menu"]', '[class*="panel"]', '[class*="gui"]'
        ];
        selectors.forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) {
                el.style.display    = 'none';
                el.style.visibility = 'hidden';
                el.style.width      = '0';
                el.style.height     = '0';
                el.style.overflow   = 'hidden';
            });
        });
        document.querySelectorAll('canvas').forEach(function(c) {
            c.style.width    = '100vw';
            c.style.height   = '100vh';
            c.style.position = 'fixed';
            c.style.top  = '0';
            c.style.left = '0';
        });
        window.dispatchEvent(new Event('resize'));
    }

    // ─── Clamp util ───────────────────────────────────────────────
    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

    // ─── Aplica medidas recebidas do app ──────────────────────────
    window._kcApplyMeasurements = function(data) {
        // Salva os valores para as labels
        KC_MEASUREMENTS.ombros        = data.shoulder ? String(data.shoulder) : null;
        KC_MEASUREMENTS.peito         = data.bust     ? String(data.bust)     : null;
        KC_MEASUREMENTS.cintura       = data.waist    ? String(data.waist)    : null;
        KC_MEASUREMENTS.abdomen       = data.abdomen  ? String(data.abdomen)  : null;
        KC_MEASUREMENTS.quadril       = data.hip      ? String(data.hip)      : null;
        KC_MEASUREMENTS.bicepsDir     = data.bicepsDir   ? String(data.bicepsDir)   : null;
        KC_MEASUREMENTS.bicepsEsq     = data.bicepsEsq   ? String(data.bicepsEsq)   : null;
        KC_MEASUREMENTS.coxaDir       = data.coxaDir     ? String(data.coxaDir)     : null;
        KC_MEASUREMENTS.coxaEsq       = data.coxaEsq     ? String(data.coxaEsq)     : null;
        KC_MEASUREMENTS.panturrilhaDir = data.panturrilhaDir ? String(data.panturrilhaDir) : null;
        KC_MEASUREMENTS.panturrilhaEsq = data.panturrilhaEsq ? String(data.panturrilhaEsq) : null;

        updateLabelValues();

        // Aplica ao modelo 3D
        var genderVal = (data.gender === 'male') ? 1 : 0;
        setGender(genderVal);

        var isMale   = (genderVal === 1);
        var defaults = isMale
            ? [90.6, 86.7, 81.2, 95.2, 38.5, 77.1, 37.7, 174.0]
            : [90.4, 80.6, 80.2, 98.3, 33.4, 76.3, 36.6, 168.0];

        var hCm       = (parseFloat(data.height) || defaults[7] / 100) * 100;
        var bust      = parseFloat(data.bust)     || defaults[0];
        var underBust = bust * 0.88;
        var waist     = parseFloat(data.waist)    || defaults[2];
        var hip       = parseFloat(data.hip)      || defaults[3];
        var shoulder  = parseFloat(data.shoulder) || defaults[6];
        var insideLeg = hCm * 0.45;
        var neckGirth = defaults[4];

        var mins = [ 79.0,  70.0,  52.0,  79.0,  29.0,  65.0,  29.0, 145.0];
        var maxs = [113.0, 101.0, 113.0, 121.0,  45.0,  95.0,  60.0, 201.0];

        resetParams([
            clamp(bust,       mins[0], maxs[0]),
            clamp(underBust,  mins[1], maxs[1]),
            clamp(waist,      mins[2], maxs[2]),
            clamp(hip,        mins[3], maxs[3]),
            clamp(neckGirth,  mins[4], maxs[4]),
            clamp(insideLeg,  mins[5], maxs[5]),
            clamp(shoulder,   mins[6], maxs[6]),
            clamp(hCm,        mins[7], maxs[7])
        ]);

        // Ativa as linhas de medida
        MEASURE_CURVES.visible = true;
        redrawCurves();

        setTimeout(hideGUI, 50);

        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ status: 'applied' }));
        }
    };

    // ─── Escuta mensagens do app ──────────────────────────────────
    window.addEventListener('message', function(event) {
        try {
            var data = JSON.parse(event.data);
            if (data && window._kcApplyMeasurements) {
                window._kcApplyMeasurements(data);
            }
        } catch(e) {
            console.warn('KC parse error:', e);
        }
    });

    // ─── Inicialização ────────────────────────────────────────────
    window.addEventListener('load', function() {
        setTimeout(function() {
            hideGUI();
            hookRenderLoop();
            updateLabelValues();

            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ status: 'ready' }));
            }
        }, 2500);
    });

    setTimeout(hideGUI, 100);
    setTimeout(hideGUI, 600);
    </script>
</body>
</html>
