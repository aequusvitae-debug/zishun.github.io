<!DOCTYPE html>
<html>
<head>
    <title>KC Personal – 3D Body</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="assets/app_icon.png">
    <script src="threejs/three.min.js"></script>
    <script src="threejs/Detector.js"></script>
    <script src="threejs/OrbitControls.js"></script>
    <script src="threejs/OBJExporter.js"></script>
    <script src="math/numeric-1.2.6.min.js"></script>
    <script src="data/clothf.js"></script>
    <script src="data/clothm.js"></script>
    <script src="data/f.js"></script>
    <script src="data/m.js"></script>
    <script src="yagui/yagui.js"></script>
    <link rel="stylesheet" type="text/css" href="css/yagui.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#e8e8e8; }
        #viewport { width:100vw; height:100vh; position:fixed; top:0; left:0; }

        .yagui-topbar,.yagui-sidebar,.yagui-sidebar-right,
        .yagui-panel,.yagui-menu,.yagui-menubar,
        [class*="yagui-top"],[class*="yagui-right"],[class*="yagui-sidebar"] {
            display:none!important; visibility:hidden!important;
            width:0!important; height:0!important;
            overflow:hidden!important; pointer-events:none!important;
        }
        canvas { width:100vw!important; height:100vh!important; display:block!important; }

        #labels-overlay {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            pointer-events:none; z-index:100;
        }

        /* ── Label principal ── */
        .lbl {
            position:absolute;
            pointer-events:none;
            display:flex; flex-direction:column; align-items:center;
            transform:translate(-50%,-50%);
        }

        /* Pill com fundo semitransparente escuro — legível em qualquer fundo */
        .lbl-pill {
            display:flex; flex-direction:column; align-items:center;
            background: rgba(20,14,0,0.72);
            border: 1px solid rgba(212,160,23,0.6);
            border-radius: 7px;
            padding: 3px 8px 2px;
            backdrop-filter: blur(2px);
        }

        .lbl-val {
            color: #FFC107;
            font-family: -apple-system,'Helvetica Neue',sans-serif;
            font-size: 14px;
            font-weight: 800;
            white-space: nowrap;
            line-height: 1.2;
            letter-spacing: 0.2px;
        }

        .lbl-name {
            color: rgba(255,193,7,0.75);
            font-family: -apple-system,'Helvetica Neue',sans-serif;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* Linha conectora lateral */
        .lbl-line {
            height: 1px;
            background: rgba(255,193,7,0.5);
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <div id="labels-overlay"></div>
    <script src="main.js"></script>
    <script>
    'use strict';

    var KC = {
        ombros:null, peito:null, cintura:null, abdomen:null, quadril:null,
        bicepsDir:null, bicepsEsq:null,
        coxaDir:null, coxaEsq:null,
        panturrilhaDir:null, panturrilhaEsq:null,
    };

    // ── Âncoras calibradas para vista frontal ─────────────────────
    var ANCHORS = [
        { key:'ombros',          name:'Ombros',   ry:0.795, rx: 0.00, rz:0.15, pxX:  0 },
        { key:'peito',           name:'Peito',    ry:0.715, rx: 0.00, rz:0.20, pxX:  0 },
        { key:'cintura',         name:'Cintura',  ry:0.605, rx: 0.00, rz:0.15, pxX:  0 },
        { key:'abdomen',         name:'Abdômen',  ry:0.535, rx: 0.00, rz:0.16, pxX:  0 },
        { key:'quadril',         name:'Quadril',  ry:0.462, rx: 0.00, rz:0.17, pxX:  0 },
        { key:'bicepsDir',       name:'Bíceps D', ry:0.715, rx:-0.22, rz:0.00, pxX:-14 },
        { key:'bicepsEsq',       name:'Bíceps E', ry:0.715, rx: 0.22, rz:0.00, pxX: 14 },
        { key:'coxaDir',         name:'Coxa D',   ry:0.328, rx:-0.15, rz:0.14, pxX:-12 },
        { key:'coxaEsq',         name:'Coxa E',   ry:0.328, rx: 0.15, rz:0.14, pxX: 12 },
        { key:'panturrilhaDir',  name:'Pant. D',  ry:0.173, rx:-0.11, rz:0.12, pxX:-12 },
        { key:'panturrilhaEsq',  name:'Pant. E',  ry:0.173, rx: 0.11, rz:0.12, pxX: 12 },
    ];

    var lblEls = {};
    var overlay = document.getElementById('labels-overlay');

    ANCHORS.forEach(function(a) {
        var w = document.createElement('div');
        w.className = 'lbl'; w.id = 'lbl-'+a.key;

        // Linha conectora para membros laterais
        if (a.rx !== 0) {
            var line = document.createElement('div');
            line.className = 'lbl-line';
            line.style.width = '14px';
            w.appendChild(line);
        }

        // Pill
        var pill = document.createElement('div');
        pill.className = 'lbl-pill';

        var v = document.createElement('div'); v.className = 'lbl-val'; v.textContent = '--';
        var n = document.createElement('div'); n.className = 'lbl-name'; n.textContent = a.name;

        pill.appendChild(v); pill.appendChild(n);
        w.appendChild(pill);

        overlay.appendChild(w);
        lblEls[a.key] = { w:w, v:v };
    });

    function updateValues() {
        ANCHORS.forEach(function(a) {
            var val = KC[a.key];
            var el  = lblEls[a.key];
            if (!el) return;
            var ok = val && parseFloat(val) > 0;
            el.v.textContent   = ok ? val + ' cm' : '--';
            el.w.style.opacity = ok ? '1' : '0.35';
        });
    }

    function project() {
        if (!MESH || !CAMERA || !RENDERER) return;
        var bbox = new THREE.Box3().setFromObject(MESH);
        var mH   = bbox.max.y - bbox.min.y;
        var cx   = (bbox.max.x + bbox.min.x) / 2;
        var cz   = (bbox.max.z + bbox.min.z) / 2;
        var W    = RENDERER.domElement.clientWidth  || window.innerWidth;
        var H    = RENDERER.domElement.clientHeight || window.innerHeight;

        ANCHORS.forEach(function(a) {
            var el = lblEls[a.key]; if (!el) return;
            var p  = new THREE.Vector3(
                cx + a.rx * mH,
                bbox.min.y + a.ry * mH,
                cz + a.rz * mH
            ).project(CAMERA);

            if (p.z > 1) { el.w.style.display='none'; return; }
            el.w.style.display = 'flex';
            el.w.style.left    = ( p.x*0.5+0.5)*W + a.pxX + 'px';
            el.w.style.top     = (-p.y*0.5+0.5)*H + 'px';
        });
    }

    function hookRender() {
        if (typeof render==='function' && typeof RENDERER!=='undefined') {
            var orig = render;
            window.render = function(){ orig(); project(); };
        } else { setTimeout(hookRender, 100); }
    }

    function setCameraFrontal() {
        if (!CAMERA || !CONTROLS || !MESH) { setTimeout(setCameraFrontal, 200); return; }
        var bbox = new THREE.Box3().setFromObject(MESH);
        var cy   = (bbox.max.y + bbox.min.y) / 2;
        var mH   = bbox.max.y - bbox.min.y;
        CAMERA.position.set(0, cy, mH * 1.5);
        CONTROLS.target.set(0, cy * 0.9, 0);
        CONTROLS.update();
    }

    function hideGUI() {
        var ss = ['.yagui-topbar','.yagui-sidebar','.yagui-panel',
                  'nav','[class*="sidebar"]','[class*="topbar"]',
                  '[class*="menu"]','[class*="panel"]','[class*="gui"]'];
        ss.forEach(function(s){
            document.querySelectorAll(s).forEach(function(el){
                el.style.cssText='display:none!important;visibility:hidden!important;width:0!important;height:0!important;overflow:hidden!important;';
            });
        });
        document.querySelectorAll('canvas').forEach(function(c){
            c.style.width='100vw'; c.style.height='100vh';
            c.style.position='fixed'; c.style.top='0'; c.style.left='0';
        });
        window.dispatchEvent(new Event('resize'));
    }

    function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

    window._kcApply = function(data) {
        KC.ombros         = data.shoulder      ? String(Math.round(data.shoulder))      : null;
        KC.peito          = data.bust          ? String(Math.round(data.bust))          : null;
        KC.cintura        = data.waist         ? String(Math.round(data.waist))         : null;
        KC.abdomen        = data.abdomen       ? String(Math.round(data.abdomen))       : null;
        KC.quadril        = data.hip           ? String(Math.round(data.hip))           : null;
        KC.bicepsDir      = data.bicepsDir     ? String(Math.round(data.bicepsDir))     : null;
        KC.bicepsEsq      = data.bicepsEsq     ? String(Math.round(data.bicepsEsq))     : null;
        KC.coxaDir        = data.coxaDir       ? String(Math.round(data.coxaDir))       : null;
        KC.coxaEsq        = data.coxaEsq       ? String(Math.round(data.coxaEsq))       : null;
        KC.panturrilhaDir = data.panturrilhaDir ? String(Math.round(data.panturrilhaDir)) : null;
        KC.panturrilhaEsq = data.panturrilhaEsq ? String(Math.round(data.panturrilhaEsq)) : null;

        updateValues();

        var gv = data.gender==='male' ? 1 : 0;
        setGender(gv);

        var isMale = gv===1;
        var def = isMale
            ? [90.6,86.7,81.2,95.2,38.5,77.1,37.7,174.0]
            : [90.4,80.6,80.2,98.3,33.4,76.3,36.6,168.0];

        var hCm = (parseFloat(data.height)||def[7]/100)*100;
        var b   = parseFloat(data.bust)||def[0];
        var w   = parseFloat(data.waist)||def[2];
        var h   = parseFloat(data.hip)||def[3];
        var s   = parseFloat(data.shoulder)||def[6];

        resetParams([
            clamp(b,       79,113),
            clamp(b*0.88,  70,101),
            clamp(w,       52,113),
            clamp(h,       79,121),
            clamp(def[4],  29, 45),
            clamp(hCm*.45, 65, 95),
            clamp(s,       29, 60),
            clamp(hCm,    145,201),
        ]);

        // Só ativa as 5 curvas que o modelo suporta
        MEASURE_CURVES.visible = true;
        redrawCurves();

        setTimeout(setCameraFrontal, 150);
        setTimeout(hideGUI, 80);

        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({status:'applied'}));
        }
    };

    window._kcApplyMeasurements = window._kcApply;

    window.addEventListener('message', function(e) {
        try { var d=JSON.parse(e.data); if(d) window._kcApply(d); }
        catch(err){ console.warn('KC:',err); }
    });

    window.addEventListener('load', function() {
        setTimeout(function(){
            hideGUI();
            hookRender();
            updateValues();
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({status:'ready'}));
            }
        }, 2500);
    });

    setTimeout(hideGUI, 100);
    setTimeout(hideGUI, 800);
    </script>
</body>
</html>
