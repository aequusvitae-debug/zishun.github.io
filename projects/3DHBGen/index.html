<!DOCTYPE html>
<html>
<head>
    <title>WebGL 3D Human Body Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="assets/app_icon.png">
    <script src="threejs/three.min.js"></script>
    <script src="threejs/Detector.js"></script>
    <script src="threejs/OrbitControls.js"></script>
    <script src="threejs/OBJExporter.js"></script>
    <script src="math/numeric-1.2.6.min.js"></script>
    <script src="data/clothf.js"></script>
    <script src="data/clothm.js"></script>
    <script src="data/f.js"></script>
    <script src="data/m.js"></script>
    <script src="yagui/yagui.js"></script>
    <link rel="stylesheet" type="text/css" href="css/yagui.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #f0f0f0; }

        #viewport { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

        /* Esconde toda a interface yagui */
        .yagui-topbar, .yagui-sidebar, .yagui-sidebar-right,
        .yagui-panel, .yagui-menu, .yagui-menubar,
        [class*="yagui-top"], [class*="yagui-right"], [class*="yagui-sidebar"] {
            display: none !important; visibility: hidden !important;
            width: 0 !important; height: 0 !important;
            overflow: hidden !important; pointer-events: none !important;
        }

        canvas { width: 100vw !important; height: 100vh !important; display: block !important; }

        /* ── Labels flutuantes ── */
        #labels-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        .body-label {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
            transition: left 0.1s, top 0.1s, opacity 0.2s;
        }

        /* Valor numérico — dourado sem fundo, igual à imagem de referência */
        .body-label-value {
            color: #D4A017;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 15px;
            font-weight: 800;
            white-space: nowrap;
            text-shadow:
                0 0 6px rgba(0,0,0,0.9),
                0 0 12px rgba(0,0,0,0.7),
                1px 1px 0 rgba(0,0,0,0.8);
            letter-spacing: 0.3px;
        }

        /* Nome da medida — menor, abaixo */
        .body-label-name {
            color: rgba(212, 160, 23, 0.65);
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 8px;
            font-weight: 600;
            margin-top: 1px;
            text-shadow: 0 1px 4px rgba(0,0,0,1);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Linha lateral conectora (para bíceps/coxa/panturrilha) */
        .body-label-connector {
            width: 18px; height: 1px;
            background: rgba(212, 160, 23, 0.5);
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
    <div id='viewport'></div>
    <div id='labels-overlay'></div>

    <script type='text/javascript' src='main.js'></script>

    <script>
    'use strict';

    // ─── Medidas recebidas do app ─────────────────────────────────
    var KC_MEASUREMENTS = {
        ombros: null, peito: null, cintura: null, abdomen: null, quadril: null,
        bicepsDir: null, bicepsEsq: null,
        coxaDir: null, coxaEsq: null,
        panturrilhaDir: null, panturrilhaEsq: null,
    };

    // ─── Âncoras 3D calibradas ────────────────────────────────────
    // ry = fração da altura do modelo a partir do chão (0=chão, 1=topo)
    // rx = deslocamento horizontal em frações da altura (0=centro)
    // rz = profundidade frontal
    // side: 'center' | 'left' | 'right'
    var LABEL_ANCHORS = [
        // Tronco central — empilhados verticalmente, sem sobreposição
        { key: 'ombros',   name: 'Ombros',   ry: 0.795, rx:  0.00, rz: 0.16, side: 'center' },
        { key: 'peito',    name: 'Peito',    ry: 0.720, rx:  0.00, rz: 0.20, side: 'center' },
        { key: 'cintura',  name: 'Cintura',  ry: 0.610, rx:  0.00, rz: 0.16, side: 'center' },
        { key: 'abdomen',  name: 'Abdômen',  ry: 0.540, rx:  0.00, rz: 0.17, side: 'center' },
        { key: 'quadril',  name: 'Quadril',  ry: 0.465, rx:  0.00, rz: 0.18, side: 'center' },
        // Membros — esquerda e direita, evitando sobreposição com centro
        { key: 'bicepsDir',      name: 'Bíceps D',  ry: 0.720, rx: -0.21, rz: 0.04, side: 'left'   },
        { key: 'bicepsEsq',      name: 'Bíceps E',  ry: 0.720, rx:  0.21, rz: 0.04, side: 'right'  },
        { key: 'coxaDir',        name: 'Coxa D',    ry: 0.330, rx: -0.14, rz: 0.15, side: 'left'   },
        { key: 'coxaEsq',        name: 'Coxa E',    ry: 0.330, rx:  0.14, rz: 0.15, side: 'right'  },
        { key: 'panturrilhaDir', name: 'Pant. D',   ry: 0.175, rx: -0.10, rz: 0.13, side: 'left'   },
        { key: 'panturrilhaEsq', name: 'Pant. E',   ry: 0.175, rx:  0.10, rz: 0.13, side: 'right'  },
    ];

    // ─── Cria elementos DOM ───────────────────────────────────────
    var labelEls = {};
    var overlay  = document.getElementById('labels-overlay');

    LABEL_ANCHORS.forEach(function(a) {
        var wrap = document.createElement('div');
        wrap.className = 'body-label';
        wrap.id = 'label-' + a.key;

        // Linha conectora apenas para membros laterais
        if (a.side !== 'center') {
            var conn = document.createElement('div');
            conn.className = 'body-label-connector';
            if (a.side === 'right') conn.style.transform = 'scaleX(-1)';
            wrap.appendChild(conn);
        }

        var valEl  = document.createElement('div');
        valEl.className = 'body-label-value';
        valEl.textContent = '--';
        wrap.appendChild(valEl);

        var nameEl = document.createElement('div');
        nameEl.className = 'body-label-name';
        nameEl.textContent = a.name;
        wrap.appendChild(nameEl);

        overlay.appendChild(wrap);
        labelEls[a.key] = { wrap: wrap, valEl: valEl };
    });

    // ─── Atualiza textos das labels ───────────────────────────────
    function updateLabelValues() {
        LABEL_ANCHORS.forEach(function(a) {
            var val = KC_MEASUREMENTS[a.key];
            var el  = labelEls[a.key];
            if (!el) return;
            var hasVal = val && parseFloat(val) > 0;
            el.valEl.textContent       = hasVal ? val + ' cm' : '--';
            el.wrap.style.opacity      = hasVal ? '1' : '0.25';
        });
    }

    // ─── Projeta posições 3D → pixels na tela ────────────────────
    function projectLabels() {
        if (!MESH || !CAMERA || !RENDERER) return;

        var bbox   = new THREE.Box3().setFromObject(MESH);
        var modelH = bbox.max.y - bbox.min.y;
        var cx     = (bbox.max.x + bbox.min.x) / 2;
        var cz     = (bbox.max.z + bbox.min.z) / 2;

        var W = RENDERER.domElement.clientWidth  || window.innerWidth;
        var H = RENDERER.domElement.clientHeight || window.innerHeight;

        LABEL_ANCHORS.forEach(function(a) {
            var el = labelEls[a.key];
            if (!el) return;

            var worldPos = new THREE.Vector3(
                cx + a.rx * modelH,
                bbox.min.y + a.ry * modelH,
                cz + a.rz * modelH
            );

            var proj = worldPos.clone().project(CAMERA);

            if (proj.z > 1) { el.wrap.style.display = 'none'; return; }

            el.wrap.style.display = 'flex';
            el.wrap.style.left    = ( proj.x * 0.5 + 0.5) * W + 'px';
            el.wrap.style.top     = (-proj.y * 0.5 + 0.5) * H + 'px';
        });
    }

    // ─── Hook no loop de render ───────────────────────────────────
    function hookRenderLoop() {
        if (typeof render === 'function' && typeof RENDERER !== 'undefined') {
            var orig = render;
            window.render = function() { orig(); projectLabels(); };
        } else {
            setTimeout(hookRenderLoop, 100);
        }
    }

    // ─── Esconde GUI yagui ────────────────────────────────────────
    function hideGUI() {
        var sels = ['.yagui-topbar','.yagui-sidebar','.yagui-panel',
                    'nav','[class*="sidebar"]','[class*="topbar"]',
                    '[class*="menu"]','[class*="panel"]','[class*="gui"]'];
        sels.forEach(function(s) {
            document.querySelectorAll(s).forEach(function(el) {
                el.style.cssText = 'display:none!important;visibility:hidden!important;width:0!important;height:0!important;overflow:hidden!important;';
            });
        });
        document.querySelectorAll('canvas').forEach(function(c) {
            c.style.width = '100vw'; c.style.height = '100vh';
            c.style.position = 'fixed'; c.style.top = '0'; c.style.left = '0';
        });
        window.dispatchEvent(new Event('resize'));
    }

    function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

    // ─── Recebe medidas do app e aplica ao modelo ─────────────────
    window._kcApplyMeasurements = function(data) {
        // Salva para as labels
        KC_MEASUREMENTS.ombros        = data.shoulder   ? String(Math.round(data.shoulder))   : null;
        KC_MEASUREMENTS.peito         = data.bust       ? String(Math.round(data.bust))       : null;
        KC_MEASUREMENTS.cintura       = data.waist      ? String(Math.round(data.waist))      : null;
        KC_MEASUREMENTS.abdomen       = data.abdomen    ? String(Math.round(data.abdomen))    : null;
        KC_MEASUREMENTS.quadril       = data.hip        ? String(Math.round(data.hip))        : null;
        KC_MEASUREMENTS.bicepsDir     = data.bicepsDir  ? String(Math.round(data.bicepsDir))  : null;
        KC_MEASUREMENTS.bicepsEsq     = data.bicepsEsq  ? String(Math.round(data.bicepsEsq))  : null;
        KC_MEASUREMENTS.coxaDir       = data.coxaDir    ? String(Math.round(data.coxaDir))    : null;
        KC_MEASUREMENTS.coxaEsq       = data.coxaEsq    ? String(Math.round(data.coxaEsq))    : null;
        KC_MEASUREMENTS.panturrilhaDir = data.panturrilhaDir ? String(Math.round(data.panturrilhaDir)) : null;
        KC_MEASUREMENTS.panturrilhaEsq = data.panturrilhaEsq ? String(Math.round(data.panturrilhaEsq)) : null;

        updateLabelValues();

        // Aplica ao modelo 3D
        var genderVal = data.gender === 'male' ? 1 : 0;
        setGender(genderVal);

        var isMale   = genderVal === 1;
        var def      = isMale
            ? [90.6, 86.7, 81.2, 95.2, 38.5, 77.1, 37.7, 174.0]
            : [90.4, 80.6, 80.2, 98.3, 33.4, 76.3, 36.6, 168.0];

        var hCm      = (parseFloat(data.height) || def[7]/100) * 100;
        var bust     = parseFloat(data.bust)     || def[0];
        var waist    = parseFloat(data.waist)    || def[2];
        var hip      = parseFloat(data.hip)      || def[3];
        var shoulder = parseFloat(data.shoulder) || def[6];

        var mins = [ 79, 70, 52, 79, 29, 65, 29, 145];
        var maxs = [113,101,113,121, 45, 95, 60, 201];

        resetParams([
            clamp(bust,        mins[0], maxs[0]),
            clamp(bust*0.88,   mins[1], maxs[1]),
            clamp(waist,       mins[2], maxs[2]),
            clamp(hip,         mins[3], maxs[3]),
            clamp(def[4],      mins[4], maxs[4]),
            clamp(hCm*0.45,    mins[5], maxs[5]),
            clamp(shoulder,    mins[6], maxs[6]),
            clamp(hCm,         mins[7], maxs[7]),
        ]);

        // Ativa as curvas de medida do modelo
        MEASURE_CURVES.visible = true;
        redrawCurves();

        setTimeout(hideGUI, 60);

        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ status: 'applied' }));
        }
    };

    // ─── Escuta mensagens do app ──────────────────────────────────
    window.addEventListener('message', function(e) {
        try {
            var d = JSON.parse(e.data);
            if (d && window._kcApplyMeasurements) window._kcApplyMeasurements(d);
        } catch(err) { console.warn('KC parse:', err); }
    });

    // ─── Init ─────────────────────────────────────────────────────
    window.addEventListener('load', function() {
        setTimeout(function() {
            hideGUI();
            hookRenderLoop();
            updateLabelValues();
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ status: 'ready' }));
            }
        }, 2500);
    });

    setTimeout(hideGUI, 100);
    setTimeout(hideGUI, 700);
    </script>
</body>
</html>
